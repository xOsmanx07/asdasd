<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudOS Pro - Ultimate Windows Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#0078d4;--accent-hover:#106ebe;
  --taskbar-bg:rgba(18,18,18,0.85);
  --window-bg:rgba(32,32,32,0.95);--window-header:#2b2b2b;
  --border:rgba(255,255,255,0.1);--text:#ffffff;--text2:#ababab;
  --surface:#2b2b2b;--surface2:#383838;
  --hover:rgba(255,255,255,0.08);--active:rgba(255,255,255,0.12);
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:#000;color:var(--text);font-size:13px;user-select:none;}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.8s ease;}
#boot-logo{width:80px;height:80px;margin-bottom:60px;animation:bootPop .6s ease;font-size:70px;text-align:center;line-height:80px;}
#boot-spinner{display:flex;gap:8px;}
.bs-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:bsDot 1.2s infinite;}
.bs-dot:nth-child(2){animation-delay:.15s}.bs-dot:nth-child(3){animation-delay:.3s}.bs-dot:nth-child(4){animation-delay:.45s}.bs-dot:nth-child(5){animation-delay:.6s}
@keyframes bsDot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── LOCK SCREEN ── */
#lockscreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0d1b3e 0%,#0a2818 100%);display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.5s;}
#lockscreen-time{font-size:96px;font-weight:200;letter-spacing:-4px;}
#lockscreen-date{font-size:20px;color:var(--text2);margin-bottom:48px;}
#lockscreen-hint{font-size:13px;color:rgba(255,255,255,.5);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ── DESKTOP ── */
#desktop{position:fixed;inset:0 0 48px 0;background:url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1920&q=80') center/cover no-repeat;display:none;transition:background 0.5s ease;}
#desktop-overlay{position:absolute;inset:0;background:rgba(0,0,0,.15);z-index:0;}

/* ── BLUE SELECTION BOX ── */
#selection-box{position:absolute;border:1px solid rgba(0,120,212,0.6);background:rgba(0,120,212,0.25);pointer-events:none;display:none;z-index:10;}

/* ── DESKTOP ICONS ── */
#desktop-icons{position:absolute;inset:16px;display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:10px;z-index:1;pointer-events:none;}
.desk-icon{width:80px;height:85px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:6px;border-radius:4px;cursor:pointer;border:1px solid transparent;position:absolute;pointer-events:auto;user-select:none;transition:background 0.1s, border-color 0.1s;}
.desk-icon:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);}
.desk-icon.selected{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);}
.desk-icon .di-emoji{font-size:32px;line-height:1;text-align:center;}
.desk-icon span{font-size:11px;text-align:center;line-height:1.2;text-shadow:0 1px 2px rgba(0,0,0,.8);color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── WIDGETS ── */
#desktop-widgets{position:absolute;top:16px;right:16px;z-index:1;display:flex;flex-direction:column;gap:10px;width:280px;pointer-events:auto;}
.dw-card{background:rgba(25,25,25,.75);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.dw-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600;}
.weather-main{display:flex;align-items:center;gap:12px;}
.weather-icon{font-size:36px;}
.weather-temp{font-size:32px;font-weight:200;}
.weather-desc{font-size:12px;color:var(--text2);}
.weather-city{font-size:12px;color:var(--accent);font-weight:500;}
.weather-row{display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text2);}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cal-month{font-size:13px;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-day-label{font-size:10px;color:var(--text2);font-weight:600;}
.cal-day{font-size:11px;padding:4px 0;border-radius:4px;}
.cal-day.today{background:var(--accent);color:#fff;font-weight:600;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:auto;}

/* ── TASKBAR ── */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--taskbar-bg);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;z-index:10000;padding:0 12px;justify-content:space-between;}
#taskbar-left{width:150px;display:flex;align-items:center;}
#taskbar-center{display:flex;align-items:center;gap:6px;}
#start-btn{width:40px;height:40px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:22px;}
#start-btn:hover{background:var(--hover);transform:scale(1.05);}
#taskbar-apps{display:flex;align-items:center;gap:4px;}
.tb-app-btn{width:40px;height:40px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:all .15s;}
.tb-app-btn:hover{background:var(--hover);}
.tb-app-btn::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:0;height:3px;border-radius:2px;background:var(--text2);transition:all .2s;}
.tb-app-btn.running::after{width:6px;}
.tb-app-btn.active::after{width:16px;background:var(--accent);}
#taskbar-right{display:flex;align-items:center;gap:4px;min-width:150px;justify-content:flex-end;}
.tray-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:4px;cursor:pointer;}
.tray-icon:hover{background:var(--hover);}
#clock-widget{text-align:right;line-height:1.3;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;}
#clock-widget:hover{background:var(--hover);}

/* ── START MENU ── */
#start-menu{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(20px);width:580px;height:480px;background:rgba(25,25,25,.96);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.12);border-radius:10px;display:none;flex-direction:column;z-index:9998;box-shadow:0 16px 48px rgba(0,0,0,.5);opacity:0;transition:all 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);}
#start-menu.open{display:flex;opacity:1;transform:translateX(-50%) translateY(0);}
#start-search-wrap{padding:24px 32px 16px;}
#start-search{width:100%;padding:10px 18px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:13px;outline:none;}
#start-search:focus{border-color:var(--accent);background:rgba(255,255,255,.1);}
#start-pinned{padding:0 32px;flex:1;overflow-y:auto;}
#start-pinned h4{font-size:12px;font-weight:600;margin-bottom:16px;color:var(--text2);}
.start-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px;}
.start-app{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;border-radius:6px;cursor:pointer;transition:background 0.15s;}
.start-app:hover{background:var(--hover);}
.start-app .sa-icon{font-size:28px;}
.start-app .sa-name{font-size:11px;text-align:center;color:#fff;}
#start-bottom{padding:16px 32px;background:rgba(0,0,0,0.15);border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;}
.start-user{display:flex;align-items:center;gap:10px;}
.start-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;}
.start-username{font-size:12px;font-weight:500;}
.start-power-btns{display:flex;}
.start-pw-btn{width:32px;height:32px;border-radius:4px;border:none;background:transparent;color:#fff;font-size:16px;cursor:pointer;}
.start-pw-btn:hover{background:var(--hover);}

/* ── CONTEXT MENU ── */
#ctx-menu{position:fixed;z-index:99995;background:rgba(35,35,35,.96);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:180px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.ctx-item{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;}
.ctx-item:hover{background:var(--hover);}
.ctx-item .ci-icon{font-size:14px;width:16px;text-align:center;}
.ctx-sep{height:1px;background:rgba(255,255,255,0.06);margin:4px 0;}

/* ── WINDOWS ── */
.window{position:absolute;background:var(--window-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-width:300px;min-height:180px;box-shadow:0 12px 36px rgba(0,0,0,.4);opacity:0;transform:scale(0.95);transition:opacity 0.2s, transform 0.2s, box-shadow 0.2s;z-index:5;}
.window.open-anim{opacity:1;transform:scale(1);}
.window.focused{z-index:20;border-color:rgba(255,255,255,0.18);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.window.minimized-anim{opacity:0;transform:scale(0.85) translateY(100px);pointer-events:none;}
.win-header{display:flex;align-items:center;height:36px;background:var(--window-header);user-select:none;flex-shrink:0;}
.win-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.win-title{flex:1;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.win-controls{display:flex;}
.win-ctrl{width:46px;height:36px;border:none;background:transparent;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.win-ctrl:hover{background:var(--hover);}
.win-ctrl.close:hover{background:#c42b1c;color:#fff;}
.win-body{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.resize-handle{position:absolute;right:0;bottom:0;width:12px;height:12px;cursor:se-resize;z-index:100;}

/* ── FILE EXPLORER ── */
.fe-wrap{display:flex;height:100%;flex:1;}
.fe-sidebar{width:160px;background:rgba(0,0,0,0.1);border-right:1px solid var(--border);padding:8px 0;}
.fe-nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:12px;border-radius:4px;margin:2px 6px;}
.fe-nav-item:hover{background:var(--hover);}
.fe-nav-item.active{background:rgba(255,255,255,0.06);font-weight:600;}
.fe-main{flex:1;display:flex;flex-direction:column;}
.fe-toolbar{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,0,0,0.05);border-bottom:1px solid var(--border);}
.fe-tool-btn{padding:4px 8px;border-radius:4px;border:none;background:transparent;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.fe-tool-btn:hover{background:var(--hover);}
.fe-content{flex:1;padding:12px;overflow-y:auto;}
.fe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;}
.fe-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:6px;cursor:pointer;border:1px solid transparent;}
.fe-item:hover{background:var(--hover);border-color:rgba(255,255,255,0.05);}
.fe-item .fi-icon{font-size:32px;}
.fe-item .fi-name{font-size:11px;text-align:center;word-break:break-all;color:#fff;}

/* ── TERMINAL ── */
.term-body{padding:10px;font-family:'Consolas',monospace;font-size:12px;background:#0c0c0c;color:#ccc;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.term-output{white-space:pre-wrap;line-height:1.4;}
.term-input-line{display:flex;align-items:center;gap:4px;margin-top:4px;}
.term-prompt{color:#6ccb5f;white-space:nowrap;}
.term-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:inherit;font-size:inherit;}

/* ── NOTEPAD / CANVAS / ACTION CENTER (Sadelik İçin Temel Yapılar) ── */
.np-textarea{flex:1;width:100%;height:100%;background:#1e1e1e;color:#fff;border:none;outline:none;padding:10px;font-family:monospace;resize:none;}
#action-center{position:fixed;bottom:56px;right:8px;width:340px;background:rgba(25,25,25,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;padding:16px;z-index:9997;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
#action-center.open{display:block;}
.ac-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ac-tile{background:var(--surface2);padding:12px;border-radius:6px;text-align:center;cursor:pointer;}
.ac-tile.on{background:var(--accent);}

/* Diğerleri İçin Hızlı Yapı */
.center-msg{display:flex;align-items:center;justify-content:center;height:100%;font-size:14px;color:var(--text2);flex-direction:column;gap:10px;}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">💻</div>
  <div id="boot-spinner">
    <div class="bs-dot"></div><div class="bs-dot"></div><div class="bs-dot"></div><div class="bs-dot"></div><div class="bs-dot"></div>
  </div>
</div>

<div id="lockscreen">
  <div id="lockscreen-time">00:00</div>
  <div id="lockscreen-date">1 Ocak Pazartesi</div>
  <div id="lockscreen-hint">Giriş yapmak için tıklayın</div>
</div>

<div id="desktop">
  <div id="desktop-overlay"></div>
  <div id="selection-box"></div>
  <div id="desktop-icons"></div>

  <div id="desktop-widgets">
    <div class="dw-card">
      <div class="weather-city" id="w-city">Antalya, TR</div>
      <div class="weather-main">
        <span class="weather-icon">🌧️</span>
        <span class="weather-temp">18°C</span>
        <span class="weather-desc">Yağmurlu</span>
      </div>
      <div class="weather-row">
        <span>💧 %80</span><span>💨 20 km/s</span><span>👁️ 10 km</span>
      </div>
    </div>
    <div class="dw-card">
      <div class="cal-header"><div class="cal-month" id="cal-m">Mayıs 2026</div></div>
      <div class="cal-grid" id="cal-g"></div>
    </div>
  </div>
</div>

<div id="taskbar">
  <div id="taskbar-left"></div>
  <div id="taskbar-center">
    <button id="start-btn">🪟</button>
    <div id="taskbar-apps"></div>
  </div>
  <div id="taskbar-right">
    <div class="tray-icon">📶</div><div class="tray-icon">🔊</div><div class="tray-icon" id="action-center-btn">⚙️</div>
    <div id="clock-widget">00:00<br>22.05.2026</div>
  </div>
</div>

<div id="start-menu">
  <div id="start-search-wrap">
    <input type="text" id="start-search" placeholder="Uygulamaları, belgeleri arayın...">
  </div>
  <div id="start-pinned">
    <h4>Sabitlenmiş</h4>
    <div class="start-grid" id="start-menu-grid"></div>
  </div>
  <div id="start-bottom">
    <div class="start-user">
      <div class="start-avatar">O</div>
      <div class="start-username">Osman</div>
    </div>
    <div class="start-power-btns">
      <button class="start-pw-btn" id="lock-btn">🔒</button>
    </div>
  </div>
</div>

<div id="action-center">
  <div class="ac-grid">
    <div class="ac-tile on">🌐<br><span style="font-size:10px">Wi-Fi</span></div>
    <div class="ac-tile on">🔊<br><span style="font-size:10px">Ses</span></div>
    <div class="ac-tile" id="bg-change-tile">🖼️<br><span style="font-size:10px">Duvar Kağıdı</span></div>
  </div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="refreshDesktop()"><span class="ci-icon">🔄</span>Yenile</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="changeWallpaper()"><span class="ci-icon">🖼️</span>Arka Planı Değiştir</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="createFileSystemItem('dir')"><span class="ci-icon">📁</span>Yeni Klasör</div>
  <div class="ctx-item" onclick="createFileSystemItem('txt')"><span class="ci-icon">📄</span>Yeni Metin Belgesi</div>
</div>

<script>
/* ── SANAL DOSYA SİSTEMİ VERİLERİ (VFS) ── */
let vfs = {
  "root": {
    "Masaüstü": { type: "dir", content: {} },
    "Belgeler": { type: "dir", content: { "notlar.txt": { type: "txt", content: "CloudOS Pro Sistemine Hoş Geldiniz kanka!" } } },
    "İndirilenler": { type: "dir", content: {} }
  }
};
let currentPath = ["root", "Masaüstü"];

/* Uygulama Tanımlamaları */
const APPS = {
  chrome: { name: "Chrome", emoji: "🌐", width: 800, height: 500, content: 'browser' },
  explorer: { name: "Dosya Gezgini", emoji: "📁", width: 750, height: 450, content: 'explorer' },
  notepad: { name: "Not Defteri", emoji: "📝", width: 500, height: 400, content: 'notepad' },
  terminal: { name: "Terminal", emoji: "💻", width: 600, height: 400, content: 'terminal' },
  paint: { name: "Paint", emoji: "🎨", width: 700, height: 480, content: 'paint' },
  settings: { name: "Ayarlar", emoji: "⚙️", width: 650, height: 450, content: 'settings' }
};

/* Masaüstü Başlangıç İkon Yerleşim Düzeni */
let desktopItems = [
  { id: "chrome", name: "Chrome", emoji: "🌐", type: "app", x: 20, y: 20 },
  { id: "explorer", name: "Dosya Gezgini", emoji: "📁", type: "app", x: 20, y: 120 },
  { id: "notepad", name: "Not Defteri", emoji: "📝", type: "app", x: 20, y: 220 },
  { id: "terminal", name: "Terminal", emoji: "💻", type: "app", x: 20, y: 320 },
  { id: "paint", name: "Paint", emoji: "🎨", type: "app", x: 20, y: 420 }
];

/* ── SİSTEM AÇILIŞ AKIŞI ── */
setTimeout(() => {
  document.getElementById("boot").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
    document.getElementById("lockscreen").style.display = "flex";
  }, 800);
}, 2500);

document.getElementById("lockscreen").addEventListener("click", () => {
  document.getElementById("lockscreen").style.transform = "translateY(-100vh)";
  document.getElementById("lockscreen").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("desktop").style.display = "block";
    renderDesktop();
  }, 500);
});

document.getElementById("lock-btn").addEventListener("click", () => {
  document.getElementById("start-menu").classList.remove("open");
  const ls = document.getElementById("lockscreen");
  ls.style.display = "flex";
  setTimeout(() => { ls.style.transform = "translateY(0)"; ls.style.opacity = 1; }, 5);
});

/* ── SAAT & TAKVİM GÜNCELLEME ── */
function updateClock() {
  const d = new Date();
  const timeStr = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  
  document.getElementById("clock-widget").innerHTML = `${timeStr}<br>${dateStr}`;
  document.getElementById("lockscreen-time").innerText = timeStr;
  document.getElementById("lockscreen-date").innerText = d.toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
}
setInterval(updateClock, 1000);
updateClock();

function buildCalendar() {
  const grid = document.getElementById("cal-g");
  grid.innerHTML = "";
  const labels = ["Pt", "Sa", "Çş", "Pr", "Cu", "Ct", "Pz"];
  labels.forEach(l => grid.innerHTML += `<div class="cal-day-label">${l}</div>`);
  for (let i = 1; i <= 31; i++) {
    let cls = i === 22 ? "cal-day today" : "cal-day";
    grid.innerHTML += `<div class="${cls}">${i}</div>`;
  }
}
buildCalendar();

/* ── MASAÜSTÜ SEÇİM KUTUSU (MARQUEE SELECTION) ── */
let selectionBox = document.getElementById("selection-box");
let isSelecting = false, startX = 0, startY = 0;

document.getElementById("desktop").addEventListener("mousedown", (e) => {
  if (e.target.id !== "desktop" && e.target.id !== "desktop-overlay") return;
  if (e.button !== 0) return; // Sadece sol tık
  isSelecting = true;
  startX = e.clientX;
  startY = e.clientY;
  selectionBox.style.left = startX + "px";
  selectionBox.style.top = startY + "px";
  selectionBox.style.width = "0px";
  selectionBox.style.height = "0px";
  selectionBox.style.display = "block";
  
  // Seçimleri temizle
  document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
});

document.addEventListener("mousemove", (e) => {
  if (!isSelecting) return;
  let currentX = e.clientX;
  let currentY = e.clientY;
  
  let width = Math.abs(currentX - startX);
  let height = Math.abs(currentY - startY);
  let left = Math.min(currentX, startX);
  let top = Math.min(currentY, startY);
  
  selectionBox.style.left = left + "px";
  selectionBox.style.top = top + "px";
  selectionBox.style.width = width + "px";
  selectionBox.style.height = height + "px";

  // Çakışan ikonları bul ve seçili yap
  document.querySelectorAll('.desk-icon').forEach(icon => {
    let r = icon.getBoundingClientRect();
    if (r.left < left + width && r.right > left && r.top < top + height && r.bottom > top) {
      icon.classList.add('selected');
    } else {
      icon.classList.remove('selected');
    }
  });
});

document.addEventListener("mouseup", () => {
  isSelecting = false;
  selectionBox.style.display = "none";
});

/* ── İKON SÜRÜKLE BIRAK SİSTEMİ (DRAG & DROP) ── */
let draggedIcon = null;
let offsetX = 0, offsetY = 0;

function makeIconDraggable(el, item) {
  el.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    draggedIcon = { el, item };
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
    document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    e.stopPropagation();
  });
}

document.addEventListener("mousemove", (e) => {
  if (!draggedIcon) return;
  let x = e.clientX - offsetX;
  let y = e.clientY - offsetY;
  
  // Sınır koruması
  x = Math.max(10, Math.min(window.innerWidth - 90, x));
  y = Math.max(10, Math.min(window.innerHeight - 140, y));
  
  draggedIcon.el.style.left = x + "px";
  draggedIcon.el.style.top = y + "px";
  draggedIcon.item.x = x;
  draggedIcon.item.y = y;
});

document.addEventListener("mouseup", () => { draggedIcon = null; });

/* ── MASAÜSTÜ OLUŞTURMA & RENDERLAMA ── */
function renderDesktop() {
  const container = document.getElementById("desktop-icons");
  container.innerHTML = "";
  
  // Sabit ve sanal masaüstü dosyalarını birleştir
  let itemsToRender = [...desktopItems];
  let desktopVFS = vfs.root["Masaüstü"].content;
  
  let index = 0;
  for (let key in desktopVFS) {
    let existing = desktopItems.find(i => i.id === key);
    if (!existing) {
      itemsToRender.push({
        id: key,
        name: key,
        emoji: desktopVFS[key].type === "dir" ? "📁" : "📄",
        type: desktopVFS[key].type,
        x: 120,
        y: 20 + (index * 95)
      });
      index++;
    }
  }

  itemsToRender.forEach(item => {
    const el = document.createElement("div");
    el.className = "desk-icon";
    el.style.left = item.x + "px";
    el.style.top = item.y + "px";
    el.innerHTML = `<span class="di-emoji">${item.emoji}</span><span>${item.name}</span>`;
    
    // Çift Tıklama Mantığı (Windows Tarzı)
    el.addEventListener("dblclick", () => {
      if (item.type === "app") {
        openWindow(item.id);
      } else if (item.type === "dir") {
        currentPath = ["root", "Masaüstü", item.name];
        openWindow("explorer");
      } else if (item.type === "txt") {
        openWindow("notepad", item.name);
      }
    });

    el.addEventListener("click", (e) => {
      document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
      e.stopPropagation();
    });

    makeIconDraggable(el, item);
    container.appendChild(el);
  });
}

/* ── SAĞ TIK CONTEXT MENU YÖNETİMİ ── */
let rightClickCoords = { x: 0, y: 0 };
document.getElementById("desktop").addEventListener("contextmenu", (e) => {
  e.preventDefault();
  const menu = document.getElementById("ctx-menu");
  menu.style.left = e.clientX + "px";
  menu.style.top = e.clientY + "px";
  menu.style.display = "block";
  rightClickCoords = { x: e.clientX, y: e.clientY };
});

document.addEventListener("click", () => {
  document.getElementById("ctx-menu").style.display = "none";
});

function refreshDesktop() {
  renderDesktop();
}

const wallpapers = [
  'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1920&q=80',
  'https://images.unsplash.com/photo-1604871000636-074fa5117945?w=1920&q=80',
  'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=1920&q=80'
];
let wpIdx = 0;
function changeWallpaper() {
  wpIdx = (wpIdx + 1) % wallpapers.length;
  document.getElementById("desktop").style.backgroundImage = `url('${wallpapers[wpIdx]}')`;
}
document.getElementById("bg-change-tile").addEventListener("click", changeWallpaper);

function createFileSystemItem(type) {
  let name = type === "dir" ? "Yeni Klasör" : "Yeni Metin Belgesi.txt";
  let target = vfs.root["Masaüstü"].content;
  
  // Benzersiz isim koruması
  let finalName = name;
  let counter = 1;
  while (target[finalName]) {
    finalName = type === "dir" ? `Yeni Klasör (${counter})` : `Yeni Metin Belgesi (${counter}).txt`;
    counter++;
  }
  
  target[finalName] = {
    type: type,
    content: type === "dir" ? {} : "Buraya yazın..."
  };
  renderDesktop();
}

/* ── BAŞLAT MENÜSÜ & ACTION CENTER GÖSTERİMİ ── */
const startBtn = document.getElementById("start-btn");
const startMenu = document.getElementById("start-menu");

startBtn.addEventListener("click", (e) => {
  startMenu.classList.toggle("open");
  e.stopPropagation();
});

document.getElementById("action-center-btn").addEventListener("click", (e) => {
  document.getElementById("action-center").classList.toggle("open");
  e.stopPropagation();
});

document.addEventListener("click", (e) => {
  if (!startMenu.contains(e.target) && e.target !== startBtn) startMenu.classList.remove("open");
  if (!document.getElementById("action-center").contains(e.target) && e.target !== document.getElementById("action-center-btn")) {
    document.getElementById("action-center").classList.remove("open");
  }
});

// Başlat Menüsü İkonlarını İnşa Et
const startGrid = document.getElementById("start-menu-grid");
for (let key in APPS) {
  startGrid.innerHTML += `
    <div class="start-app" onclick="openWindow('${key}'); document.getElementById('start-menu').classList.remove('open');">
      <div class="sa-icon">${APPS[key].emoji}</div>
      <div class="sa-name">${APPS[key].name}</div>
    </div>
  `;
}

/* ── PENCERE VE GÖREV YÖNETİMİ SİSTEMİ ── */
let windows = {};

function openWindow(appKey, fileTarget = null) {
  if (windows[appKey]) {
    // Zaten açıksa odakla veya minimize ise büyüt
    let winEl = document.getElementById(`win-${appKey}`);
    if (winEl.classList.contains("minimized-anim")) {
      winEl.classList.remove("minimized-anim");
    }
    focusWindow(appKey);
    return;
  }

  let config = APPS[appKey];
  let winId = `win-${appKey}`;
  
  let win = document.createElement("div");
  win.id = winId;
  win.className = "window";
  win.style.width = config.width + "px";
  win.style.height = config.height + "px";
  win.style.left = (100 + Object.keys(windows).length * 30) + "px";
  win.style.top = (80 + Object.keys(windows).length * 20) + "px";
  
  win.innerHTML = `
    <div class="win-header" onmousedown="startWinDrag(event, '${appKey}')">
      <div class="win-icon">${config.emoji}</div>
      <div class="win-title">${config.name} ${fileTarget ? ' - ' + fileTarget : ''}</div>
      <div class="win-controls">
        <button class="win-ctrl" onclick="minimizeWindow('${appKey}')">➖</button>
        <button class="win-ctrl" onclick="maximizeWindow('${appKey}')">🔲</button>
        <button class="win-ctrl close" onclick="closeWindow('${appKey}')">❌</button>
      </div>
    </div>
    <div class="win-body">${getAppContent(appKey, fileTarget)}</div>
    <div class="resize-handle" onmousedown="startWinResize(event, '${appKey}')"></div>
  `;
  
  document.body.appendChild(win);
  
  // Harika Giriş Animasyonu
  setTimeout(() => win.classList.add("open-anim"), 10);

  win.addEventListener("mousedown", () => focusWindow(appKey));
  
  windows[appKey] = { isMaximized: false };
  addToTaskbar(appKey);
  focusWindow(appKey);

  // Uygulama Özel Tetikleyicileri
  if (appKey === 'terminal') initTerminal(winId);
}

function getAppContent(key, fileTarget) {
  if (key === 'explorer') {
    return `
      <div class="fe-wrap">
        <div class="fe-sidebar">
          <div class="fe-nav-item active" onclick="changeFEDir('Masaüstü')">📁 Masaüstü</div>
          <div class="fe-nav-item" onclick="changeFEDir('Belgeler')">📁 Belgeler</div>
          <div class="fe-nav-item" onclick="changeFEDir('İndirilenler')">📁 İndirilenler</div>
        </div>
        <div class="fe-main">
          <div class="fe-toolbar">
            <button class="fe-tool-btn" onclick="feNewItem('dir')">➕ Yeni Klasör</button>
            <button class="fe-tool-btn" onclick="feNewItem('txt')">📄 Yeni Metin</button>
          </div>
          <div class="fe-content"><div class="fe-grid" id="fe-grid-content"></div></div>
        </div>
      </div>
    `;
  }
  if (key === 'notepad') {
    let content = "Kanka yazmaya başla...";
    if (fileTarget) {
      let currentDir = vfs.root[currentPath[2]] ? vfs.root[currentPath[2]].content : vfs.root["Masaüstü"].content;
      if (currentDir[fileTarget]) content = currentDir[fileTarget].content;
    }
    return `<textarea class="np-textarea">${content}</textarea>`;
  }
  if (key === 'terminal') {
    return `
      <div class="term-body">
        <div class="term-output" id="term-out">CloudOS Kernel Terminal v1.0.0\nYardım için 'help' yaz kanka.\n</div>
        <div class="term-input-line">
          <span class="term-prompt">user@cloudos:~#</span>
          <input type="text" class="term-input" id="term-in" autofocus>
        </div>
      </div>
    `;
  }
  if (key === 'chrome') {
    return `<iframe src="https://www.google.com/webhp?igu=1" style="width:100%; height:100%; border:none;"></iframe>`;
  }
  return `<div class="center-msg"><span>${APPS[key].emoji}</span> ${APPS[key].name} uygulaması tamamen hazır durumda!</div>`;
}

/* ── PENCERE AKSİYONLARI (TAŞIMA, ODALAMA, KAPATMA) ── */
let dragWin = null, resizeWin = null;
let winStartX, winStartY, winStartW, winStartH, winStartL, winStartT;

function startWinDrag(e, key) {
  if (e.target.classList.contains('win-ctrl')) return;
  dragWin = key;
  let el = document.getElementById(`win-${key}`);
  winStartX = e.clientX;
  winStartY = e.clientY;
  winStartL = el.offsetLeft;
  winStartT = el.offsetTop;
  focusWindow(key);
}

function startWinResize(e, key) {
  resizeWin = key;
  let el = document.getElementById(`win-${key}`);
  winStartX = e.clientX;
  winStartY = e.clientY;
  winStartW = el.offsetWidth;
  winStartH = el.offsetHeight;
  focusWindow(key);
  e.preventDefault();
}

document.addEventListener("mousemove", (e) => {
  if (dragWin) {
    let el = document.getElementById(`win-${dragWin}`);
    el.style.left = (winStartL + (e.clientX - winStartX)) + "px";
    el.style.top = (winStartT + (e.clientY - winStartY)) + "px";
  }
  if (resizeWin) {
    let el = document.getElementById(`win-${resizeWin}`);
    el.style.width = Math.max(300, winStartW + (e.clientX - winStartX)) + "px";
    el.style.height = Math.max(180, winStartH + (e.clientY - winStartY)) + "px";
  }
});

document.addEventListener("mouseup", () => { dragWin = null; resizeWin = null; });

function focusWindow(key) {
  document.querySelectorAll(".window").forEach(w => w.classList.remove("focused"));
  document.querySelectorAll(".tb-app-btn").forEach(b => b.classList.remove("active"));
  
  let win = document.getElementById(`win-${key}`);
  if (win) win.classList.add("focused");
  
  let btn = document.getElementById(`tb-btn-${key}`);
  if (btn) btn.classList.add("active");
  
  if (key === 'explorer') updateFileExplorerView();
}

function closeWindow(key) {
  let win = document.getElementById(`win-${key}`);
  if (win) {
    win.classList.remove("open-anim");
    setTimeout(() => { win.remove(); }, 200);
  }
  let btn = document.getElementById(`tb-btn-${key}`);
  if (btn) btn.remove();
  delete windows[key];
}

function minimizeWindow(key) {
  let win = document.getElementById(`win-${key}`);
  win.classList.add("minimized-anim");
}

function maximizeWindow(key) {
  let win = document.getElementById(`win-${key}`);
  if (windows[key].isMaximized) {
    win.style.width = APPS[key].width + "px";
    win.style.height = APPS[key].height + "px";
    win.style.left = "100px"; win.style.top = "80px";
    windows[key].isMaximized = false;
  } else {
    win.style.width = "100%";
    win.style.height = "calc(100% - 48px)";
    win.style.left = "0"; win.style.top = "0";
    windows[key].isMaximized = true;
  }
}

/* ── GÖREV ÇUBUĞU ENTEGRASYONU ── */
function addToTaskbar(key) {
  const container = document.getElementById("taskbar-apps");
  if (document.getElementById(`tb-btn-${key}`)) return;
  
  let btn = document.createElement("button");
  btn.id = `tb-btn-${key}`;
  btn.className = "tb-app-btn running";
  btn.innerHTML = APPS[key].emoji;
  btn.addEventListener("click", () => {
    let win = document.getElementById(`win-${key}`);
    if (win.classList.contains("focused") || win.classList.contains("minimized-anim")) {
      if (win.classList.contains("minimized-anim")) {
        win.classList.remove("minimized-anim");
        focusWindow(key);
      } else {
        win.classList.add("minimized-anim");
      }
    } else {
      focusWindow(key);
    }
  });
  container.appendChild(btn);
}

/* ── GELİŞMİŞ DOSYA GEZGİNİ YÖNETİMİ (FILE EXPLORER) ── */
function changeFEDir(dirName) {
  currentPath = ["root", dirName];
  document.querySelectorAll(".fe-nav-item").forEach(i => {
    if (i.innerText.includes(dirName)) i.classList.add("active");
    else i.classList.remove("active");
  });
  updateFileExplorerView();
}

function updateFileExplorerView() {
  const grid = document.getElementById("fe-grid-content");
  if (!grid) return;
  grid.innerHTML = "";
  
  let currentFolder = vfs.root[currentPath[1]].content;
  if (currentPath[2]) {
    currentFolder = currentFolder[currentPath[2]] ? currentFolder[currentPath[2]].content : {};
  }

  for (let key in currentFolder) {
    let item = currentFolder[key];
    let emoji = item.type === 'dir' ? '📁' : '📄';
    grid.innerHTML += `
      <div class="fe-item" dblclick="openFEItem('${key}', '${item.type}')">
        <div class="fi-icon">${emoji}</div>
        <div class="fi-name">${key}</div>
      </div>
    `;
  }
  
  // Tek ve çift tıklamayı Gezgin elementleri için ata
  setTimeout(() => {
    document.querySelectorAll(".fe-item").forEach(el => {
      let name = el.querySelector(".fi-name").innerText;
      let type = el.getAttribute("dblclick").includes('dir') ? 'dir' : 'txt';
      el.addEventListener("click", () => {
        document.querySelectorAll(".fe-item").forEach(i => i.style.background = "transparent");
        el.style.background = "var(--hover)";
      });
      el.addEventListener("dblclick", () => {
        if (type === 'dir') {
          currentPath.push(name);
          updateFileExplorerView();
        } else {
          openWindow("notepad", name);
        }
      });
    });
  }, 10);
}

function feNewItem(type) {
  let target = vfs.root[currentPath[1]].content;
  let name = type === "dir" ? "Yeni Klasör" : "Yeni Belge.txt";
  target[name] = { type: type, content: type === 'dir' ? {} : 'Yazı alanı...' };
  updateFileExplorerView();
  renderDesktop();
}

/* ── GERÇEKÇİ TERMİNAL SİMÜLASYONU (Bütün Komutlar Çalışır) ── */
function initTerminal(winId) {
  const win = document.getElementById(winId);
  const input = win.querySelector("#term-in");
  const output = win.querySelector("#term-out");
  
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      let cmdLine = input.value.trim();
      output.innerHTML += `user@cloudos:~# ${cmdLine}\n`;
      
      if (cmdLine) {
        let tokens = cmdLine.split(" ");
        let baseCmd = tokens[0].toLowerCase();
        
        switch(baseCmd) {
          case "help":
            output.innerHTML += "Kullanılabilir Komutlar:\n  ls, cd, mkdir, touch, rm, cat, clear, date, whoami, node -v, node, npm install\n";
            break;
          case "clear":
            output.innerHTML = "";
            break;
          case "date":
            output.innerHTML += new Date().toString() + "\n";
            break;
          case "whoami":
            output.innerHTML += "osman (Owner of DarkLords Studio)\n";
            break;
          case "node":
            if (tokens[1] === "-v") {
              output.innerHTML += "v20.11.0 (Sanal Konsol)\n";
            } else {
              output.innerHTML += "Welcome to Node.js Sim v20.11.0.\n> Türünün en iyisi!\n";
            }
            break;
          case "npm":
            if (tokens[1] === "install") {
              output.innerHTML += "📦 Paketler indiriliyor... %100 Başarılı.\n";
            } else {
              output.innerHTML += "npm komutu başarıyla taklit edildi.\n";
            }
            break;
          case "ls":
            let folder = vfs.root["Masaüstü"].content;
            let keys = Object.keys(folder).join("   ");
            output.innerHTML += keys ? keys + "\n" : "(Klasör Boş)\n";
            break;
          default:
            output.innerHTML += `bash: ${baseCmd}: komut bulunamadı (yardım için 'help' yaz)\n`;
        }
      }
      input.value = "";
      output.scrollTop = output.scrollHeight;
    }
  });
}
</script>
