<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudOS - NextGen WebOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
:root{
  --accent:#0078d4;--accent-hover:#106ebe;
  --taskbar-bg:rgba(18,18,18,0.85);
  --window-bg:#202020;--window-header:#2b2b2b;
  --border:rgba(255,255,255,0.1);--text:#ffffff;--text2:#ababab;
  --surface:#2b2b2b;--surface2:#383838;
  --hover:rgba(255,255,255,0.08);--active:rgba(255,255,255,0.12);
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:#000;color:var(--text);font-size:13px;}

/* ── BOOT SCREEN ── */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.8s ease;}
#boot-logo{width:100px;height:100px;margin-bottom:40px;font-size:80px;text-align:center;animation:bootPop .6s ease;}
@keyframes bootPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
#boot-spinner{display:flex;gap:8px;}
.bs-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:bsDot 1.2s infinite;}
.bs-dot:nth-child(2){animation-delay:.15s}.bs-dot:nth-child(3){animation-delay:.3s}.bs-dot:nth-child(4){animation-delay:.45s}
@keyframes bsDot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ── LOCK SCREEN ── */
#lockscreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#311042 100%);display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.5s;}
#lockscreen-time{font-size:96px;font-weight:200;letter-spacing:-2px;}
#lockscreen-date{font-size:22px;color:var(--text2);margin-bottom:48px;}
#lockscreen-hint{font-size:14px;color:rgba(255,255,255,.6);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── DESKTOP ── */
#desktop{position:fixed;inset:0 0 48px 0;background:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover no-repeat;display:none;overflow:hidden;}
#desktop-overlay{position:absolute;inset:0;background:rgba(0,0,0,.15);z-index: 0;}

/* ── SELECTION BOX (Mavi Şey) ── */
#drag-select{position:absolute;background:rgba(0,120,212,0.25);border:1px solid #0078d4;display:none;pointer-events:none;z-index:99;}

/* ── DESKTOP ICONS ── */
#desktop-icons{position:absolute;inset:20px;display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:15px;z-index:1;pointer-events:none;}
.desk-icon{width:80px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;border-radius:4px;cursor:pointer;pointer-events:auto;position:absolute;transition:background 0.1s, border 0.1s;border:1px solid transparent;}
.desk-icon:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);}
.desk-icon.selected{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);}
.desk-icon .di-emoji{font-size:36px;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
.desk-icon span{font-size:11px;text-align:center;line-height:1.3;text-shadow:0 1px 3px rgba(0,0,0,.9);color:#fff;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── WINDOWS ── */
.window{position:absolute;background:rgba(32,32,32,0.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-width:400px;min-height:300px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:10;transform:scale(0.95);opacity:0;transition:transform 0.18s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.18s;visibility:hidden;}
.window.show{transform:scale(1);opacity:1;visibility:visible;}
.window.focused{border-color:rgba(255,255,255,0.25);box-shadow:0 15px 45px rgba(0,0,0,.6);z-index:50;}
.window.minimized{transform:scale(0.8) translateY(100px);opacity:0;visibility:hidden;pointer-events:none;}
.window.maximized{inset:0 !important;width:100% !important;height:100% !important;border-radius:0;}
.win-header{display:flex;align-items:center;height:38px;background:var(--window-header);flex-shrink:0;user-select:none;}
.win-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.win-title{flex:1;font-size:12px;color:#e3e3e3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.win-controls{display:flex;height:100%;}
.win-ctrl{width:46px;height:100%;border:none;background:transparent;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
.win-ctrl:hover{background:rgba(255,255,255,.1);}
.win-ctrl.close:hover{background:#e81123;}
.win-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--window-bg);}
.resize-handle{position:absolute;right:0;bottom:0;width:12px;height:12px;cursor:se-resize;z-index:100;}

/* ── FILE EXPLORER ── */
.fe-wrap{display:flex;height:100%;flex:1;}
.fe-sidebar{width:160px;border-right:1px solid var(--border);padding:10px 4px;background:rgba(25,25,25,0.5);flex-shrink:0;}
.fe-nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-radius:6px;transition:background 0.1s;}
.fe-nav-item:hover{background:var(--hover);}
.fe-nav-item.active{background:rgba(0,120,212,0.2);color:var(--accent);font-weight:600;}
.fe-main{flex:1;display:flex;flex-direction:column;}
.fe-toolbar{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(35,35,35,0.4);border-bottom:1px solid var(--border);}
.fe-btn{padding:4px 8px;border:none;background:transparent;color:#fff;cursor:pointer;border-radius:4px;font-size:12px;}
.fe-btn:hover{background:var(--hover);}
.fe-path{flex:1;background:rgba(0,0,0,0.2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;color:#ccc;font-size:12px;}
.fe-content{flex:1;padding:15px;overflow-y:auto;}
.fe-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:12px;}
.fe-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:6px;cursor:pointer;text-align:center;}
.fe-item:hover{background:var(--hover);}
.fe-item.selected{background:rgba(0,120,212,0.25);outline:1px solid var(--accent);}
.fe-item .fi-icon{font-size:32px;}
.fe-item .fi-name{font-size:11px;word-break:break-all;color:#fff;}

/* ── TERMINAL ── */
.term-body{padding:12px;font-family:'Consolas', 'Courier New', monospace;background:#0c0c0c;color:#00ff00;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.term-output{flex:1;white-space:pre-wrap;overflow-y:auto;line-height:1.4;margin-bottom:8px;}
.term-line{display:flex;align-items:center;gap:6px;}
.term-prompt{color:#00ff00;font-weight:bold;white-space:nowrap;}
.term-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:inherit;font-size:13px;}

/* ── TASKBAR ── */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--taskbar-bg);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:10000;}
#start-btn{font-size:24px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background 0.1s;}
#start-btn:hover{background:var(--hover);}
#taskbar-apps{display:flex;gap:6px;position:absolute;left:50%;transform:translateX(-50%);}
.tb-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border-radius:4px;position:relative;transition:transform 0.1s;}
.tb-icon:hover{background:var(--hover);transform:translateY(-2px);}
.tb-icon.running::after{content:'';position:absolute;bottom:2px;left:25%;width:50%;height:3px;background:var(--accent);border-radius:2px;}
.tb-icon.active{background:rgba(255,255,255,0.15);}
#taskbar-right{display:flex;align-items:center;gap:12px;font-size:12px;color:#ddd;}
#clock{text-align:right;cursor:pointer;padding:4px;border-radius:4px;}
#clock:hover{background:var(--hover);}

/* ── START MENU ── */
#start-menu{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);width:500px;height:550px;background:rgba(25,25,25,0.92);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:8px;z-index:9998;display:none;flex-direction:column;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,0.5);transform:translateY(20px) translateX(-50%);opacity:0;transition:transform 0.2s ease, opacity 0.2s ease;}
#start-menu.show{display:flex;transform:translateY(0) translateX(-50%);opacity:1;}
#start-search{width:100%;padding:10px 15px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:20px;color:#fff;outline:none;margin-bottom:20px;}
.start-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;}
.start-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;flex:1;}
.start-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:10px;border-radius:6px;transition:background 0.1s;}
.start-item:hover{background:var(--hover);}
.start-item .si-icon{font-size:32px;}
.start-item .si-name{font-size:11px;color:#fff;}

/* ── CONTEXT MENU (Sağ Tık) ── */
#context-menu{position:fixed;background:rgba(35,35,35,0.95);backdrop-filter:blur(15px);border:1px solid var(--border);border-radius:6px;padding:4px;min-width:160px;z-index:100000;display:none;box-shadow:0 5px 20px rgba(0,0,0,0.4);}
.cm-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:4px;color:#fff;font-size:12px;}
.cm-item:hover{background:var(--accent);}
.cm-sep{height:1px;background:var(--border);margin:4px 0;}

/* ── WALLPAPER CHANGER APP ── */
.wp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:15px;height:100%;overflow-y:auto;}
.wp-thumb{width:100%;height:100px;border-radius:6px;background-size:cover;background-position:center;cursor:pointer;border:2px solid transparent;transition:transform 0.1s;}
.wp-thumb:hover{transform:scale(1.03);}
.wp-thumb.active{border-color:var(--accent);}

/* ── NOTEPAD ── */
.notepad-text{width:100%;height:100%;background:transparent;border:none;outline:none;color:#fff;padding:12px;font-family:monospace;font-size:14px;resize:none;}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <div id="boot-logo">💻</div>
  <div id="boot-spinner">
    <div class="bs-dot"></div>
    <div class="bs-dot"></div>
    <div class="bs-dot"></div>
  </div>
</div>

<!-- LOCK SCREEN -->
<div id="lockscreen">
  <div id="lockscreen-time">00:00</div>
  <div id="lockscreen-date">1 Ocak Pazartesi</div>
  <div id="lockscreen-hint">Masaüstüne geçmek için tıklayın</div>
</div>

<!-- CONTEXT MENU (Sağ Tık) -->
<div id="context-menu"></div>

<!-- DESKTOP -->
<div id="desktop">
  <div id="desktop-overlay"></div>
  <div id="drag-select"></div>
  <div id="desktop-icons"></div>
</div>

<!-- START MENU -->
<div id="start-menu">
  <input type="text" id="start-search" placeholder="Uygulama, dosya ara...">
  <div class="start-section-title">Sabitlenmiş Uygulamalar</div>
  <div class="start-grid" id="start-apps-grid"></div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <div id="start-btn">🪟</div>
  <div id="taskbar-apps"></div>
  <div id="taskbar-right">
    <div id="clock">00:00<br>01.01.2026</div>
  </div>
</div>

<script>
// --- SİSTEM DOSYA YAPISI (VFS) ---
let fs = {
  "Masaüstü": {
    "Beni Oku.txt": { type: "file", content: "CloudOS Dünyasına Hoş Geldin!\nBu sistem tamamen saf JavaScript ile yazılmıştır.\nMavi seçim kutusunu test etmek için sol tıka basılı tutup sürükle!" },
    "Notlarım.txt": { type: "file", content: "Yapılacaklar:\n1. JavaScript kasılacak.\n2. Bu OS geliştirilecek." }
  },
  "Belgeler": {
    "Proje_Planı.txt": { type: "file", content: "Gizli proje bulut işletim sistemi aşamaları..." }
  },
  "İndirilenler": {},
  "Resimler": {}
};

let currentPath = "Masaüstü";

// --- UYGULAMA TANIMLARI ---
const APPS = {
  fe: { name: "Dosya Gezgini", emoji: "📁", init: createFileExplorer },
  term: { name: "Terminal", emoji: "🪟", init: createTerminal },
  notepad: { name: "Not Defteri", emoji: "📝", init: createNotepad },
  wp: { name: "Duvar Kağıdı", emoji: "🎨", init: createWallpaperChanger }
};

// Masaüstü İkon Konum Veritabanı
let iconPositions = {
  "fe": { top: 20, left: 20 },
  "term": { top: 120, left: 20 },
  "notepad": { top: 220, left: 20 },
  "wp": { top: 320, left: 20 }
};

let activeWindows = [];
let focusedWindow = null;

// --- BOOT & LOCK SCREEN YÖNETİMİ ---
setTimeout(() => {
  const boot = document.getElementById('boot');
  boot.style.opacity = '0';
  setTimeout(() => boot.style.display = 'none', 800);
  
  const lock = document.getElementById('lockscreen');
  lock.style.display = 'flex';
}, 2500);

document.getElementById('lockscreen').addEventListener('click', function() {
  this.style.transform = 'translateY(-100%)';
  this.style.opacity = '0';
  setTimeout(() => this.style.display = 'none', 500);
  document.getElementById('desktop').style.display = 'block';
});

// Saat & Tarih Güncelleme
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' });
  const taskbarDate = now.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  
  document.getElementById('lockscreen-time').innerText = timeStr;
  document.getElementById('lockscreen-date').innerText = dateStr;
  document.getElementById('clock').innerHTML = `${timeStr}<br>${taskbarDate}`;
}
setInterval(updateClock, 1000);
updateClock();

// --- MASAÜSTÜ İKONLARINI YERLEŞTİRME VE DRAG-DROP ---
function renderDesktopIcons() {
  const container = document.getElementById('desktop-icons');
  container.innerHTML = '';
  
  Object.keys(APPS).forEach(key => {
    const app = APPS[key];
    const icon = document.createElement('div');
    icon.className = 'desk-icon';
    icon.dataset.app = key;
    
    // Konumlandırma
    const pos = iconPositions[key] || { top: 20, left: 20 };
    icon.style.top = pos.top + 'px';
    icon.style.left = pos.left + 'px';
    
    icon.innerHTML = `<span class="di-emoji">${app.emoji}</span><span>${app.name}</span>`;
    
    // Çift Tıklama ile Açılma Animasyonu ve Aksiyonu
    icon.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      icon.style.transform = "scale(1.2)";
      setTimeout(() => icon.style.transform = "scale(1)", 150);
      openWindow(key);
    });

    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
      icon.classList.add('selected');
    });
    
    // Sürükle ve Bırak (Dinamik Taşıma)
    let isDragging = false;
    let offsetX, offsetY;
    
    icon.addEventListener('mousedown', (e) => {
      if(e.button !== 0) return;
      isDragging = true;
      offsetX = e.clientX - icon.offsetLeft;
      offsetY = e.clientY - icon.offsetTop;
      icon.style.transition = 'none';
      e.stopPropagation();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      let x = e.clientX - offsetX;
      let y = e.clientY - offsetY;
      
      // Sınırlar dışına taşmasını engelle
      x = Math.max(10, Math.min(window.innerWidth - 90, x));
      y = Math.max(10, Math.min(window.innerHeight - 140, y));
      
      icon.style.left = x + 'px';
      icon.style.top = y + 'px';
      iconPositions[key] = { top: y, left: x };
    });
    
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        icon.style.transition = 'background 0.1s, border 0.1s';
      }
    });
    
    container.appendChild(icon);
  });

  // Sanal Dosyaları Masaüstüne Ekleme
  Object.keys(fs["Masaüstü"]).forEach((fileName, index) => {
    const fileData = fs["Masaüstü"][fileName];
    const icon = document.createElement('div');
    icon.className = 'desk-icon';
    icon.style.left = `120px`;
    icon.style.top = `${20 + (index * 100)}px`;
    
    icon.innerHTML = `<span class="di-emoji">📝</span><span>${fileName}</span>`;
    icon.addEventListener('dblclick', () => {
      openWindow('notepad', fileName);
    });
    container.appendChild(icon);
  });
}

// --- MAVİ SEÇİM KUTUSU (CLASSIC WINDOWS SELECTION BOX) ---
let selection = document.getElementById('drag-select');
let startX, startY;
let isSelecting = false;

document.getElementById('desktop').addEventListener('mousedown', function(e) {
  if (e.target !== this && e.target.id !== 'desktop-overlay') return;
  if (e.button !== 0) return; // Sadece sol tık
  
  document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
  closeStartMenu();
  
  isSelecting = true;
  startX = e.clientX;
  startY = e.clientY;
  
  selection.style.left = startX + 'px';
  selection.style.top = startY + 'px';
  selection.style.width = '0px';
  selection.style.height = '0px';
  selection.style.display = 'block';
});

document.addEventListener('mousemove', function(e) {
  if (!isSelecting) return;
  
  let currentX = e.clientX;
  let currentY = e.clientY;
  
  let width = Math.abs(currentX - startX);
  let height = Math.abs(currentY - startY);
  
  let left = (currentX < startX) ? currentX : startX;
  let top = (currentY < startY) ? currentY : startY;
  
  selection.style.left = left + 'px';
  selection.style.top = top + 'px';
  selection.style.width = width + 'px';
  selection.style.height = height + 'px';
  
  // Kutunun içindeki ikonları algıla ve seç
  document.querySelectorAll('.desk-icon').forEach(icon => {
    let r = icon.getBoundingClientRect();
    if (r.left < left + width && r.right > left && r.top < top + height && r.bottom > top) {
      icon.classList.add('selected');
    } else {
      icon.classList.remove('selected');
    }
  });
});

document.addEventListener('mouseup', function() {
  if (isSelecting) {
    isSelecting = false;
    selection.style.display = 'none';
  }
});

// --- PENCERE YÖNETİM SİSTEMİ (WINDOW MANAGER) ---
function openWindow(appKey, fileTarget = null) {
  const app = APPS[appKey];
  
  // Eğer pencere zaten açıksa ona odaklan
  let existingWin = document.getElementById(`win-${appKey}`);
  if (existingWin) {
    existingWin.classList.remove('minimized');
    focusWindow(existingWin);
    if(fileTarget && appKey === 'notepad') {
      existingWin.querySelector('textarea').value = fs[currentPath][fileTarget].content;
      existingWin.querySelector('.win-title').innerText = `${fileTarget} - Not Defteri`;
    }
    return;
  }
  
  const win = document.createElement('div');
  win.id = `win-${appKey}`;
  win.className = 'window';
  win.style.width = '650px';
  win.style.height = '450px';
  // Ekranın ortasında başlat
  win.style.top = `${100 + (activeWindows.length * 25)}px`;
  win.style.left = `${200 + (activeWindows.length * 25)}px`;
  
  win.innerHTML = `
    <div class="win-header">
      <div class="win-icon">${app.emoji}</div>
      <div class="win-title">${app.name} ${fileTarget ? ' - ' + fileTarget : ''}</div>
      <div class="win-controls">
        <button class="win-ctrl min">─</button>
        <button class="win-ctrl max">🗖</button>
        <button class="win-ctrl close">✕</button>
      </div>
    </div>
    <div class="win-body"></div>
    <div class="resize-handle"></div>
  `;
  
  document.getElementById('desktop').appendChild(win);
  app.init(win.querySelector('.win-body'), fileTarget);
  
  // Animasyon için tetikleyici
  setTimeout(() => win.classList.add('show'), 10);
  
  // Pencere Eventleri
  win.addEventListener('mousedown', () => focusWindow(win));
  win.querySelector('.close').addEventListener('click', (e) => { e.stopPropagation(); closeWindow(win, appKey); });
  win.querySelector('.min').addEventListener('click', (e) => { e.stopPropagation(); minimizeWindow(win); });
  win.querySelector('.max').addEventListener('click', (e) => { e.stopPropagation(); toggleMaximize(win); });
  
  setupWindowDrag(win);
  setupWindowResize(win);
  
  activeWindows.push(appKey);
  renderTaskbarApps();
  focusWindow(win);
}

function focusWindow(win) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
  focusedWindow = win;
}

function closeWindow(win, appKey) {
  win.classList.remove('show');
  setTimeout(() => {
    win.remove();
    activeWindows = activeWindows.filter(k => k !== appKey);
    renderTaskbarApps();
  }, 180);
}

function minimizeWindow(win) {
  win.classList.add('minimized');
}

function toggleMaximize(win) {
  win.classList.toggle('maximized');
}

// Pencere Taşıma Fonksiyonu
function setupWindowDrag(win) {
  const header = win.querySelector('.win-header');
  let isDragging = false;
  let offsetX, offsetY;
  
  header.addEventListener('mousedown', (e) => {
    if(win.classList.contains('maximized') || e.target.classList.contains('win-ctrl')) return;
    isDragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    focusWindow(win);
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    win.style.left = (e.clientX - offsetX) + 'px';
    win.style.top = (e.clientY - offsetY) + 'px';
  });
  
  document.addEventListener('mouseup', () => isDragging = false);
}

// Pencere Boyutlandırma
function setupWindowResize(win) {
  const handle = win.querySelector('.resize-handle');
  let isResizing = false;
  let startWidth, startHeight, startX, startY;
  
  handle.addEventListener('mousedown', (e) => {
    isResizing = true;
    startWidth = win.offsetWidth;
    startHeight = win.offsetHeight;
    startX = e.clientX;
    startY = e.clientY;
    e.preventDefault();
    e.stopPropagation();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    win.style.width = (startWidth + (e.clientX - startX)) + 'px';
    win.style.height = (startHeight + (e.clientY - startY)) + 'px';
  });
  
  document.addEventListener('mouseup', () => isResizing = false);
}

// --- DOSYA GEZGİNİ (FILE EXPLORER CODES) ---
function createFileExplorer(body) {
  body.innerHTML = `
    <div class="fe-wrap">
      <div class="fe-sidebar">
        <div class="fe-nav-item" data-path="Masaüstü">💻 Masaüstü</div>
        <div class="fe-nav-item" data-path="Belgeler">📄 Belgeler</div>
        <div class="fe-nav-item" data-path="İndirilenler">📥 İndirilenler</div>
        <div class="fe-nav-item" data-path="Resimler">🖼️ Resimler</div>
      </div>
      <div class="fe-main">
        <div class="fe-toolbar">
          <button class="fe-btn fe-back">⬅ Geri</button>
          <button class="fe-btn fe-new-file">+ Yeni Dosya</button>
          <div class="fe-path">Bu Bilgisayar > Masaüstü</div>
        </div>
        <div class="fe-content">
          <div class="fe-grid"></div>
        </div>
      </div>
    </div>
  `;
  
  const grid = body.querySelector('.fe-grid');
  const pathBar = body.querySelector('.fe-path');
  
  function updateExplorerView() {
    grid.innerHTML = '';
    pathBar.innerText = `Bu Bilgisayar > ${currentPath}`;
    
    let currentDir = fs[currentPath];
    Object.keys(currentDir).forEach(name => {
      const item = document.createElement('div');
      item.className = 'fe-item';
      const isFile = currentDir[name].type === 'file';
      item.innerHTML = `
        <div class="fi-icon">${isFile ? '📝' : '📁'}</div>
        <div class="fi-name">${name}</div>
      `;
      
      // Tek Tıkla Seçim / Çift Tıkla Açılma Mantığı (Dosya gezgininde tek tık açma opsiyonu)
      item.addEventListener('click', () => {
        if(isFile) {
          openWindow('notepad', name);
        }
      });
      grid.appendChild(item);
    });
  }
  
  body.querySelectorAll('.fe-nav-item').forEach(btn => {
    btn.addEventListener('click', function() {
      body.querySelectorAll('.fe-nav-item').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentPath = this.dataset.path;
      updateExplorerView();
    });
  });
  
  body.querySelector('.fe-new-file').addEventListener('click', () => {
    let name = prompt("Dosya adı girin (.txt):", "Yeni Metin Belgesi.txt");
    if(name) {
      fs[currentPath][name] = { type: "file", content: "Yeni dosya içeriği" };
      updateExplorerView();
      renderDesktopIcons();
    }
  });
  
  updateExplorerView();
}

// --- FULL FONKSİYONEL SÜPER TERMINAL ---
function createTerminal(body) {
  body.innerHTML = `
    <div class="term-body">
      <div class="term-output">CloudOS Command Line v1.0.0\nYardım için 'help' yazın.\n\n</div>
      <div class="term-line">
        <span class="term-prompt">C:\\${currentPath}></span>
        <input type="text" class="term-input" autofocus>
      </div>
    </div>
  `;
  
  const input = body.querySelector('.term-input');
  const output = body.querySelector('.term-output');
  
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const cmdText = input.value.trim();
      if(!cmdText) return;
      
      output.innerText += `C:\\${currentPath}> ${cmdText}\n`;
      const args = cmdText.split(' ');
      const command = args[0].toLowerCase();
      
      switch(command) {
        case 'help':
          output.innerText += "Kullanılabilir Komutlar:\n - ls : Dosyaları listeler\n - cd [klasör] : Dizin değiştirir\n - mkdir [isim] : Klasör oluşturur\n - touch [isim] : Dosya oluşturur\n - rm [isim] : Dosya/Klasör siler\n - neofetch : Sistem özelliklerini basar\n - clear : Ekranı temizler\n - matrix : Matrix modunu açar\n";
          break;
        case 'ls':
          let items = Object.keys(fs[currentPath]);
          output.innerText += items.length ? items.join('    ') + '\n' : 'Klasör boş.\n';
          break;
        case 'cd':
          if(fs[args[1]] && args[1] !== 'type') {
            currentPath = args[1];
            body.querySelector('.term-prompt').innerText = `C:\\${currentPath}>`;
          } else {
            output.innerText += `Hata: ${args[1]} adında bir dizin bulunamadı.\n`;
          }
          break;
        case 'mkdir':
          if(args[1]) {
            fs[currentPath][args[1]] = { type: "dir" };
            output.innerText += `Klasör oluşturuldu: ${args[1]}\n`;
          }
          break;
        case 'touch':
          if(args[1]) {
            fs[currentPath][args[1]] = { type: "file", content: "" };
            output.innerText += `Dosya oluşturuldu: ${args[1]}\n`;
            renderDesktopIcons();
          }
          break;
        case 'clear':
          output.innerText = '';
          break;
        case 'neofetch':
          output.innerText += `🌐 OS: CloudOS v2026.1\n💻 Kernel: JavaScript ES12\n⏱️ Uptime: Sorunsuz Aktif\n🖥️ Çözünürlük: ${window.innerWidth}x${window.innerHeight}\n🧠 RAM: 16GB Virtual WebRAM\n`;
          break;
        case 'matrix':
          output.innerText += "Matrix Modu Aktif Ediliyor...\nWake up, Neo...\nThe Matrix has you...\nFollow the white rabbit.\n";
          break;
        default:
          output.innerText += `'${command}' geçerli bir komut değil.\n`;
      }
      
      input.value = '';
      body.querySelector('.term-body').scrollTop = body.querySelector('.term-body').scrollHeight;
    }
  });
}

// --- NOTEPAD (NOT DEFTERİ) ---
function createNotepad(body, fileTarget = null) {
  let initContent = fileTarget ? fs[currentPath][fileTarget].content : "Burası boş bir not defteridir.";
  body.innerHTML = `<textarea class="notepad-text">${initContent}</textarea>`;
  
  body.querySelector('textarea').addEventListener('input', function() {
    if(fileTarget && fs[currentPath][fileTarget]) {
      fs[currentPath][fileTarget].content = this.value;
    }
  });
}

// --- DUVAR KAĞIDI DEĞİŞTİRİCİ ---
function createWallpaperChanger(body) {
  const wallpapers = [
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80',
    'https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=1920&q=80',

// --- BAŞLAT MENÜSÜ & TASKBAR YÖNETİMİ ---
const startBtn = document.getElementById('start-btn');
const startMenu = document.getElementById('start-menu');

startBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  startMenu.classList.toggle('show');
});

function closeStartMenu() {
  startMenu.classList.remove('show');
}

document.addEventListener('click', () => closeStartMenu());
startMenu.addEventListener('click', (e) => e.stopPropagation());

function renderStartMenu() {
  const grid = document.getElementById('start-apps-grid');
  grid.innerHTML = '';
  Object.keys(APPS).forEach(key => {
    const item = document.createElement('div');
    item.className = 'start-item';
    item.innerHTML = `<div class="si-icon">${APPS[key].emoji}</div><div class="si-name">${APPS[key].name}</div>`;
    item.addEventListener('click', () => {
      openWindow(key);
      closeStartMenu();
    });
    grid.appendChild(item);
  });
}

function renderTaskbarApps() {
  const container = document.getElementById('taskbar-apps');
  container.innerHTML = '';
  
  activeWindows.forEach(key => {
    const icon = document.createElement('div');
    icon.className = `tb-icon running ${focusedWindow?.id === 'win-'+key ? 'active' : ''}`;
    icon.innerHTML = APPS[key].emoji;
    icon.addEventListener('click', () => {
      const win = document.getElementById(`win-${key}`);
      if(win) {
        if (win.classList.contains('minimized') || !win.classList.contains('focused')) {
          win.classList.remove('minimized');
          focusWindow(win);
        } else {
          minimizeWindow(win);
        }
      }
    });
    container.appendChild(icon);
  });
}

// --- REALİSTİK SAĞ TIK MENÜSÜ (CONTEXT MENU) ---
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const menu = document.getElementById('context-menu');
  menu.innerHTML = '';
  
  // Eğer masaüstünde boş bir yere tıklandıysa
  if(e.target.id === 'desktop' || e.target.id === 'desktop-overlay') {
    menu.innerHTML = `
      <div class="cm-item refresh-btn">🔄 Yenile</div>
      <div class="cm-sep"></div>
      <div class="cm-item new-folder-btn">📁 Yeni Klasör</div>
      <div class="cm-item new-file-btn">📝 Yeni Metin Belgesi</div>
      <div class="cm-sep"></div>
      <div class="cm-item wp-btn">🎨 Masaüstünü Özelleştir</div>
    `;
    
    menu.querySelector('.refresh-btn').addEventListener('click', () => { renderDesktopIcons(); menu.style.display = 'none'; });
    menu.querySelector('.wp-btn').addEventListener('click', () => { openWindow('wp'); menu.style.display = 'none'; });
    menu.querySelector('.new-file-btn').addEventListener('click', () => {
      let name = prompt("Dosya adı:", "Yeni Not.txt");
      if(name) {
        fs["Masaüstü"][name] = { type: "file", content: "İçerik..." };
        renderDesktopIcons();
      }
      menu.style.display = 'none';
    });
  } else {
    // İkon veya pencere üstü sağ tık menüsü
    menu.innerHTML = `<div class="cm-item open-btn">⚡ Aç</div>`;
  }
  
  menu.style.top = e.clientY + 'px';
  menu.style.left = e.clientX + 'px';
  menu.style.display = 'block';
});

document.addEventListener('click', () => {
  document.getElementById('context-menu').style.display = 'none';
});

// --- SİSTEMİ BAŞLAT ---
renderDesktopIcons();
renderStartMenu();
</script>
