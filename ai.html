<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DarkLords AI</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  font-family: system-ui;
  color: white;
}

/* arka glow */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: #3b82f6;
  filter: blur(160px);
  opacity: 0.25;
  top: -200px;
  left: -200px;
}

/* chat box */
.container {
  width: 420px;
  height: 600px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

header {
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* msg */
.msg {
  max-width: 80%;
  padding: 10px;
  margin: 8px;
  border-radius: 12px;
  animation: pop 0.2s ease;
  word-wrap: break-word;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.07);
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* input */
.inputBar {
  display: flex;
  padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
  outline: none;
}

button {
  margin-left: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
  <header>⚡ DarkLords AI</header>

  <div id="chat"></div>

  <div class="inputBar">
    <input id="input" placeholder="Bir şey yaz..." />
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script>
const API = window.location.origin;

let memory = localStorage.getItem("mem") || "";

function log(...args){
  console.log("🧠 AI DEBUG:", ...args);
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  log("USER MSG:", msg);

  add(msg, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "yazıyor...";
  document.getElementById("chat").appendChild(loading);

  try {

    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    log("STATUS:", res.status);

    let data = await res.json();
    log("RESPONSE:", data);

    loading.remove();

    if (data.error) {
      add("ERROR: " + JSON.stringify(data.error), "ai");
      return;
    }

    add(data.reply || "boş cevap", "ai");

    memory += `\nUser: ${msg}\nAI: ${data.reply}`;
    memory = memory.split("\n").slice(-40).join("\n");

    localStorage.setItem("mem", memory);

  } catch (err) {
    loading.remove();
    log("FETCH ERROR:", err);
    add("Bağlantı hatası 💥", "ai");
  }
}
</script>

</body>
</html>
