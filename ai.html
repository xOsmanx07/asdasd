<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DarkLords AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
  overflow: hidden;
}

/* 🔥 glow animasyon */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: #4f7cff;
  filter: blur(140px);
  opacity: 0.25;
  top: -150px;
  left: -150px;
  animation: float 8s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(120px, 60px); }
}

header {
  text-align: center;
  padding: 15px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

#chat {
  height: calc(100vh - 150px);
  overflow-y: auto;
  padding: 15px;
}

/* 💬 mesaj */
.msg {
  max-width: 70%;
  padding: 12px 14px;
  margin: 10px;
  border-radius: 16px;
  animation: pop 0.25s ease;
  word-wrap: break-word;
  backdrop-filter: blur(10px);
}

.user {
  background: linear-gradient(135deg, #2b6cff, #4f7cff);
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* input bar */
.inputBar {
  display: flex;
  padding: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #111;
  color: white;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #2b6cff, #4f7cff);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.08);
}

footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.4;
  padding: 5px;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>⚡ DarkLords AI</header>

<div id="chat"></div>

<div class="inputBar">
  <input id="input" placeholder="Bir şey yaz..." />
  <button onclick="send()">Gönder</button>
</div>

<footer>powered by Gemini + Worker</footer>

<script>
const API = window.location.origin; // 🔥 kesin doğru

let memory = localStorage.getItem("mem") || "";

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  add(msg, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "yazıyor...";
  document.getElementById("chat").appendChild(loading);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, memory })
    });

    let data;
    try {
      data = await res.json();
    } catch {
      loading.remove();
      add("JSON error 💥", "ai");
      return;
    }

    loading.remove();

    if (!data.reply) {
      add("Boş cevap geldi", "ai");
      return;
    }

    add(data.reply, "ai");

    memory += `\nUser: ${msg}\nAI: ${data.reply}`;
    memory = memory.split("\n").slice(-40).join("\n");

    localStorage.setItem("mem", memory);

  } catch (err) {
    loading.remove();
    add("Bağlantı hatası ⚠️", "ai");
  }
}
</script>

</body>
</html>
